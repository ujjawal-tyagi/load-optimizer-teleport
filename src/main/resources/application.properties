server.port=8080
spring.application.name=load-optimizer

# ── Caffeine cache ─────────────────────────────────────────────────────────────
# Cache type is set programmatically in CacheConfig; no YAML spec needed.
# Metrics exposed via /actuator/metrics/cache.gets?tag=name:optimization-results
spring.cache.type=caffeine

# ── Logging ───────────────────────────────────────────────────────────────────
# Show cache hit/miss counts during development; reduce in production
logging.level.com.teleport=INFO
